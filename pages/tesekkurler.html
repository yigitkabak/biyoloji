<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erozyon Sunumu - Teşekkürler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .star-stage {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .s-star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: s-twinkle ease-in-out infinite alternate;
    }
    @keyframes s-twinkle {
      0% { opacity: 0.15; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1.4); }
    }
    .shoot-star {
      position: absolute;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.9), transparent);
      animation: shoot-go linear infinite;
      opacity: 0;
    }
    @keyframes shoot-go {
      0% { transform: translateX(-80px) translateY(0) rotate(-25deg); opacity: 0; width: 0px; }
      5% { opacity: 1; width: 80px; }
      50% { opacity: 0.7; }
      100% { transform: translateX(350px) translateY(60px) rotate(-25deg); opacity: 0; width: 30px; }
    }
    .horizon-glow {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      background: linear-gradient(to top, rgba(20,30,80,0.7) 0%, transparent 100%);
      pointer-events: none;
    }
    .aurora {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 80%, rgba(30,80,40,0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 90%, rgba(20,40,100,0.2) 0%, transparent 50%);
      animation: aurora-shift 8s ease-in-out infinite alternate;
    }
    @keyframes aurora-shift {
      0% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.05); }
      100% { opacity: 0.5; transform: scale(0.98); }
    }
    .earth-silhouette {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(to top, #0a0c1a, #0d1228);
      clip-path: polygon(0% 100%, 0% 60%, 12% 45%, 25% 55%, 38% 38%, 50% 52%, 62% 35%, 74% 48%, 85% 32%, 95% 45%, 100% 38%, 100% 100%);
    }
  </style>
</head>
<body>
<div class="site-wrapper">
  <header class="site-header">
  </header>

  <main class="slider theme-thanks" aria-live="polite" style="position:relative;">

    <div class="star-stage" id="starStage">
      <div class="aurora"></div>
      <div class="horizon-glow"></div>
      <div class="earth-silhouette"></div>
    </div>

    <section class="slide" data-index="0" style="position:relative;z-index:2;">
      <div class="slide-media">
        <figure class="image-frame" style="background:rgba(10,12,30,0.4);">
          <img src="https://i.ebayimg.com/images/g/yT8AAOSwk8lmcM~7/s-l400.jpg" alt="Gün batımında sakin bir doğa manzarası" />
        </figure>
      </div>
      <div class="slide-content">
        <h1> Bizi Dinlediğiniz için Teşekkürler</h1>
        <p class="tagline">bizi dinlediğiniz için teşekkür ederiz.</p>
        <h2>Kaynaklar</h2>
        <p class="tagline">MEB Ders Kitabı</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="controls">
      <a class="arrow-btn arrow-link" href="../index.html" aria-label="Başa dön">
        <i class="fa-solid fa-rotate-left"></i>
      </a>
    </div>
    <p class="footer-text">
      Yiğit KABAK
    </p>
  </footer>
</div>

<script>
(function() {
  const stage = document.getElementById('starStage');
  if (!stage) return;

  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    const size = 1 + Math.random() * 2.5;
    const left = Math.random() * 100;
    const top = Math.random() * 75;
    const dur = 1.5 + Math.random() * 3;
    const delay = Math.random() * 5;
    star.className = 's-star';
    star.style.cssText = `
      width:${size}px;height:${size}px;
      left:${left}%;top:${top}%;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    stage.appendChild(star);
  }

  for (let i = 0; i < 6; i++) {
    const shoot = document.createElement('div');
    const left = 5 + Math.random() * 60;
    const top = 5 + Math.random() * 50;
    const dur = 2 + Math.random() * 2;
    const delay = i * 2.5 + Math.random() * 3;
    shoot.className = 'shoot-star';
    shoot.style.cssText = `
      left:${left}%;top:${top}%;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    stage.appendChild(shoot);
  }
})();
</script>
</body>
</html>
